<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paléXarchive</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Tailwind CSS injected to support the requested folder component styles -->
<script src="https://cdn.tailwindcss.com"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-dark: #0a0a0a;
    --bg-card: #141414;
    --accent-cream: #f3f1eb;
    --text-muted: #8a8a8a;
    --border-color: rgba(243, 241, 235, 0.15);
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-dark);
    color: var(--accent-cream);
    line-height: 1.6;
    padding: 0;
  }

  /* Global Container Layout Rules */
  .layout-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* 1. Top Navigation Bar */
  nav {
    width: 100%;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    padding: 30px 0;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    position: relative;
  }

  .nav-left-zone {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .menu-icon {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 24px;
    height: 14px;
    cursor: pointer;
  }

  .menu-icon span {
    display: block;
    height: 2px;
    width: 100%;
    background-color: var(--accent-cream);
    transition: 0.3s;
  }

  .nav-tagline {
    text-align: right;
  }

  /* Dropdown Menu */
  .menu-dropdown {
    display: none;
    position: absolute;
    top: 75px;
    left: 0;
    background-color: var(--bg-card);
    border: 1px solid var(--border-color);
    padding: 20px;
    min-width: 200px;
    z-index: 1000;
  }

  .menu-dropdown a {
    display: block;
    color: var(--accent-cream);
    text-decoration: none;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 10px 0;
    border-bottom: 1px solid rgba(243, 241, 235, 0.05);
  }

  .menu-dropdown a:last-child {
    border-bottom: none;
  }

  .menu-dropdown a:hover {
    color: var(--text-muted);
  }

  /* 2. Hero Section */
  .hero-section {
    padding: 80px 0;
  }

  .main-title {
    font-size: clamp(3rem, 8vw, 6.5rem);
    font-weight: 700;
    line-height: 0.9;
    text-transform: uppercase;
    letter-spacing: -0.03em;
    text-align: left;
  }

  .hero-subtitle {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-top: 16px;
  }

  /* Vertical Rhythm Spacing between major sections */
  .main-content-area {
    display: flex;
    flex-direction: column;
    gap: 100px; 
    padding-bottom: 100px;
  }

  /* 3. Two-Column Content Section & 5. Contact Section Grid layout */
  .sections-side-by-side {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    align-items: start;
  }

  /* Section Headings */
  .section-headline {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.2rem, 4vw, 4rem);
    font-style: italic;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin-bottom: 30px;
  }

  /* 5. Contact Section Cards */
  .contact-section {
    display: flex;
    flex-direction: column;
  }

  .contact-card {
    border: 1px solid var(--border-color);
    padding: 24px;
    text-decoration: none;
    color: var(--accent-cream);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background-color 0.3s, color 0.3s;
    background-color: transparent;
  }

  .contact-card:hover {
    background-color: var(--accent-cream);
    color: var(--bg-dark);
  }

  .contact-title {
    font-size: 1.15rem;
    font-weight: 500;
  }

  /* Project Action for links */
  .project-action {
    font-size: 1.3rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 6. Footer Section */
  footer {
    background-color: #030303;
    border-top: 1px solid var(--border-color);
    padding: 60px 0;
    text-align: center;
    width: 100%;
  }

  .footer-logo {
    font-size: 2.5rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }

  .footer-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  /* Responsive styling specifically designed to keep layout side-by-side neatly on narrow mobile viewports */
  @media (max-width: 640px) {
    .sections-side-by-side {
      gap: 12px;
    }
    
    .contact-card {
      padding: 16px;
    }
    
    .contact-title {
      font-size: 1rem;
    }
  }
</style>
</head>

  <script>
    function toggleMenu() {
      var dropdown = document.getElementById("menuDropdown");
      if (dropdown.style.display === "block") {
        dropdown.style.display = "none";
      } else {
        dropdown.style.display = "block";
      }
    }
  </script>
